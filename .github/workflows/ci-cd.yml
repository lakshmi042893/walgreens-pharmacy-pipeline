name: Walgreens Pharmacy Pipeline CI/CD

on:
  push:
    branches: [dev, preprod, main]
  pull_request:
    branches: [preprod, main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Configure Databricks CLI
        run: |
          echo "[DEFAULT]
          host = ${{ secrets.DATABRICKS_HOST }}
          token = ${{ secrets.DATABRICKS_TOKEN }}" > ~/.databrickscfg

      - name: Set environment
        run: |
          if [ "${{ github.ref_name }}" == "main" ]; then
            echo "ENV=prod" >> $GITHUB_ENV
          elif [ "${{ github.ref_name }}" == "preprod" ]; then
            echo "ENV=preprod" >> $GITHUB_ENV
          else
            echo "ENV=dev" >> $GITHUB_ENV
          fi

      - name: Deploy notebooks
        run: |
          databricks workspace import-dir notebooks \
            /Workspace/Users/lakshmisas96@gmail.com/walgreens-pharmacy-pipeline/walgreens-pharmacy-pipeline/notebooks \
            --overwrite

      - name: Deploy utils
        run: |
          databricks workspace import-dir utils \
            /Workspace/Users/lakshmisas96@gmail.com/walgreens-pharmacy-pipeline/walgreens-pharmacy-pipeline/utils \
            --overwrite

      - name: Deployment complete
        run: |
          echo "✅ Notebooks deployed to $ENV environment!"
          echo "📂 Notebooks path: /Workspace/Users/lakshmisas96@gmail.com/walgreens-pharmacy-pipeline/walgreens-pharmacy-pipeline/notebooks"
